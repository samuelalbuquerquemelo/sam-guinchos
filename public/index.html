<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SAM Guinchos</title>

<style>
body{
  margin:0;
  font-family: system-ui;
  background:#0b1020;
  color:#fff;
}
.container{max-width:1100px;margin:auto;padding:20px;}
input,select{padding:10px;border-radius:8px;border:1px solid #333;background:#111;color:#fff;}
button{padding:10px 14px;border-radius:8px;border:0;background:#3b82f6;color:#fff;font-weight:bold;cursor:pointer;}
.status{font-size:12px;margin-top:6px}
#loginOverlay{
  position:fixed;inset:0;
  background:#0b1020;
  display:flex;
  align-items:center;
  justify-content:center;
}
.loginCard{background:#111;padding:20px;border-radius:12px;width:300px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginOverlay">
  <div class="loginCard">
    <h3>Login</h3>
    <input id="login_usuario" placeholder="Usuário"><br><br>
    <input id="login_senha" type="password" placeholder="Senha"><br><br>
    <button id="btnLogin">Entrar</button>
    <div class="status" id="loginStatus"></div>
  </div>
</div>

<div class="container" id="appRoot" style="display:none">
  <h2>SAM Guinchos</h2>

  <button id="btnLogout">Sair</button>

  <hr>

  <h3>Cliente</h3>
  <input id="cliente_nome" placeholder="Nome">
  <input id="cliente_telefone" placeholder="Telefone">
  <div id="telHint" class="status"></div>

  <hr>

  <h3>Histórico</h3>
  <button id="btnAtualizarHist">Atualizar</button>
  <div id="histBody"></div>
</div>

<script>
const el = id => document.getElementById(id);

// ================= LOGIN =================
async function checkAuth(){
  const r = await fetch("/me",{credentials:"include"});
  const j = await r.json().catch(()=> ({}));
  return !!(j && j.ok && j.user);
}

function showLogin(msg){
  el("loginOverlay").style.display="flex";
  el("appRoot").style.display="none";
  el("loginStatus").textContent=msg||"Informe usuário e senha.";
}

function hideLogin(){
  el("loginOverlay").style.display="none";
  el("appRoot").style.display="block";
}

async function doLogin(){
  const usuario = (el("login_usuario").value||"").trim();
  const senha = (el("login_senha").value||"").trim();

  if(!usuario || !senha){
    el("loginStatus").textContent="Informe usuário e senha.";
    return;
  }

  el("loginStatus").textContent="Validando...";

  const r = await fetch("/auth/login",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    credentials:"include",
    body: JSON.stringify({ usuario, senha })
  });

  const j = await r.json().catch(()=> ({}));

  if(!r.ok){
    el("loginStatus").textContent=j.error||"Falha no login.";
    return;
  }

  hideLogin();
  await initApp();
}

async function doLogout(){
  await fetch("/auth/logout",{method:"POST",credentials:"include"});
  showLogin("Você saiu.");
}

// ================= TELEFONE =================
function normalizePhone(v){return String(v||"").replace(/\D/g,"");}

async function lookupTelefone(){
  const tel = el("cliente_telefone").value;
  if(normalizePhone(tel).length<8) return;

  el("telHint").textContent="Buscando...";

  const r = await fetch(`/cliente_por_telefone?telefone=${encodeURIComponent(tel)}`,{
    credentials:"include"
  });

  if(r.status===404){
    el("telHint").textContent="Não cadastrado.";
    return;
  }

  const j = await r.json().catch(()=> ({}));
  if(!r.ok){
    el("telHint").textContent="Erro ao buscar.";
    return;
  }

  el("cliente_nome").value=j.nome||"";
  el("telHint").textContent="Cliente carregado.";
}

// ================= HISTÓRICO =================
async function carregarHistorico(){
  const r = await fetch("/orcamentos",{credentials:"include"});
  if(!r.ok){
    el("histBody").textContent="Erro "+r.status;
    return;
  }
  const j = await r.json().catch(()=> []);
  el("histBody").textContent=JSON.stringify(j,null,2);
}

// ================= INIT =================
async function initApp(){
  await carregarHistorico();
}

// ================= BOOT =================
(async function(){
  const ok = await checkAuth();
  if(!ok){
    showLogin();
    return;
  }
  hideLogin();
  await initApp();
})();

el("btnLogin").addEventListener("click",doLogin);
el("btnLogout").addEventListener("click",doLogout);
el("cliente_telefone").addEventListener("blur",lookupTelefone);
el("btnAtualizarHist").addEventListener("click",carregarHistorico);

</script>
</body>
</html>
